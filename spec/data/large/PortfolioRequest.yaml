  allOf:
  - "$ref": "#/components/schemas/PortfolioBase"
  - properties:
      members:
        description: An array of strings identifying users. These can either be the
          string "me", an email, or the gid of a user.
        example:
        - '52164'
        - '15363'
        items:
          description: Gid of an object.
          type: string
        type: array
      workspace:
        description: Gid of an object.
        example: '167589'
        type: string
    type: object
