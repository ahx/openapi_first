---
UserResponse:
  allOf:
  - "$ref": "#/components/schemas/UserBase"
  - properties:
      email:
        description: The user's email address.
        example: gsanchez@example.com
        format: email
        readOnly: true
        type: string
      photo:
        description: A map of the user’s profile photo in various sizes, or null if
          no photo is set. Sizes provided are 21, 27, 36, 60, 128, and 1024. All images
          are in PNG format, except for 1024 (which is in JPEG format).
        example:
          image_1024x1024: https://...
          image_128x128: https://...
          image_21x21: https://...
          image_27x27: https://...
          image_36x36: https://...
          image_60x60: https://...
        nullable: true
        properties:
          image_1024x1024:
            format: uri
            type: string
          image_128x128:
            format: uri
            type: string
          image_21x21:
            format: uri
            type: string
          image_27x27:
            format: uri
            type: string
          image_36x36:
            format: uri
            type: string
          image_60x60:
            format: uri
            type: string
        readOnly: true
        type: object
      workspaces:
        description: |-
          Workspaces and organizations this user may access.
          Note\: The API will only return workspaces and organizations that also contain the authenticated user.
        items:
          "$ref": "#/components/schemas/WorkspaceCompact"
        readOnly: true
        type: array
    type: object
