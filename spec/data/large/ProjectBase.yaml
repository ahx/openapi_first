---
ProjectBase:
  allOf:
  - "$ref": "#/components/schemas/ProjectCompact"
  - properties:
      archived:
        description: True if the project is archived, false if not. Archived projects
          do not show in the UI by default and may be treated differently for queries.
        example: false
        type: boolean
      color:
        description: Color of the project.
        enum:
        - dark-pink
        - dark-green
        - dark-blue
        - dark-red
        - dark-teal
        - dark-brown
        - dark-orange
        - dark-purple
        - dark-warm-gray
        - light-pink
        - light-green
        - light-blue
        - light-red
        - light-teal
        - light-brown
        - light-orange
        - light-purple
        - light-warm-gray
        example: light-green
        nullable: true
        type: string
      created_at:
        description: The time at which this resource was created.
        example: 2012-02-22 02:06:58.147000000 Z
        format: date-time
        readOnly: true
        type: string
      current_status:
        allOf:
        - "$ref": "#/components/schemas/ProjectStatusResponse"
        nullable: true
      custom_field_settings:
        description: Array of Custom Field Settings (in compact form).
        items:
          "$ref": "#/components/schemas/CustomFieldSettingCompact"
        readOnly: true
        type: array
      default_view:
        description: The default view (list, board, calendar, or timeline) of a project.
        enum:
        - list
        - board
        - calendar
        - timeline
        example: calendar
        type: string
      due_date:
        description: "*Deprecated: new integrations should prefer the due_on field.*"
        example: 2019-09-15
        format: date-time
        nullable: true
        type: string
      due_on:
        description: The day on which this project is due. This takes a date with
          format YYYY-MM-DD.
        example: 2019-09-15
        format: date-time
        nullable: true
        type: string
      html_notes:
        description: "[Opt In](/docs/input-output-options). The notes of the project
          with formatting as HTML."
        example: "<body>These are things we need to purchase.</body>"
        type: string
      is_template:
        description: "[Opt In](/docs/input-output-options). Determines if the project
          is a template."
        example: false
        type: boolean
      members:
        description: Array of users who are members of this project.
        items:
          "$ref": "#/components/schemas/UserCompact"
        readOnly: true
        type: array
      modified_at:
        description: |-
          The time at which this project was last modified.
          *Note: This does not currently reflect any changes in associations such as tasks or comments that may have been added or removed from the project.*
        example: 2012-02-22 02:06:58.147000000 Z
        format: date-time
        readOnly: true
        type: string
      notes:
        description: Free-form textual information associated with the project (ie.,
          its description).
        example: These are things we need to purchase.
        type: string
      public:
        description: True if the project is public to the organization. If false,
          do not share this project with other users in this organization without
          explicitly checking to see if they have access.
        example: false
        type: boolean
      start_on:
        description: 'The day on which work for this project begins, or null if the
          project has no start date. This takes a date with `YYYY-MM-DD` format. *Note:
          `due_on` or `due_at` must be present in the request when setting or unsetting
          the `start_on` parameter. Additionally, start_on and due_on cannot be the
          same date.*'
        example: 2019-09-14
        format: date
        nullable: true
        type: string
      workspace:
        allOf:
        - "$ref": "#/components/schemas/WorkspaceCompact"
        - description: "*Create-only*. The workspace or organization this project
            is associated with. Once created, projects cannot be moved to a different
            workspace. This attribute can only be specified at creation time."
          readOnly: true
          type: object
    type: object
