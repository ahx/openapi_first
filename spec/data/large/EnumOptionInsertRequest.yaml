---
EnumOptionInsertRequest:
  properties:
    after_enum_option:
      description: An existing enum option within this custom field after which the
        new enum option should be inserted. Cannot be provided together with before_enum_option.
      example: '12345'
      type: string
    before_enum_option:
      description: An existing enum option within this custom field before which the
        new enum option should be inserted. Cannot be provided together with after_enum_option.
      example: '12345'
      type: string
    enum_option:
      description: The gid of the enum option to relocate.
      example: '97285'
      type: string
  required:
  - enum_option
  type: object
