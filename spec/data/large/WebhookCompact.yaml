---
WebhookCompact:
  allOf:
  - "$ref": "#/components/schemas/AsanaResource"
  - description: Webhook objects represent the state of an active subscription for
      a server to be updated with information from Asana. This schema represents the
      subscription itself, not the objects that are sent to the server. For information
      on those please refer to the [Event](/docs/tocS_Event) schema.
    properties:
      active:
        description: If true, the webhook will send events - if false it is considered
          inactive and will not generate events.
        example: false
        readOnly: true
        type: boolean
      resource:
        "$ref": "#/components/schemas/AsanaNamedResource"
      target:
        description: The URL to receive the HTTP POST.
        example: https://example.com/receive-webhook/7654
        format: uri
        readOnly: true
        type: string
    type: object
    x-docs-overrides:
      properties.resource_type.example: webhook
