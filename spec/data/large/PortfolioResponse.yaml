---
PortfolioResponse:
  allOf:
  - "$ref": "#/components/schemas/PortfolioBase"
  - properties:
      created_at:
        description: The time at which this resource was created.
        example: 2012-02-22 02:06:58.147000000 Z
        format: date-time
        readOnly: true
        type: string
      created_by:
        "$ref": "#/components/schemas/UserCompact"
      custom_field_settings:
        description: Array of custom field settings applied to the portfolio.
        items:
          "$ref": "#/components/schemas/CustomFieldSettingResponse"
        type: array
      due_on:
        description: The localized day on which this portfolio is due. This takes
          a date with format YYYY-MM-DD.
        example: 2019-09-15
        format: date-time
        nullable: true
        type: string
      members:
        items:
          "$ref": "#/components/schemas/UserCompact"
        readOnly: true
        type: array
      owner:
        "$ref": "#/components/schemas/UserCompact"
      permalink_url:
        description: A url that points directly to the object within Asana.
        example: https://app.asana.com/0/resource/123456789/list
        readOnly: true
        type: string
      start_on:
        description: 'The day on which work for this portfolio begins, or null if
          the portfolio has no start date. This takes a date with `YYYY-MM-DD` format.
          *Note: `due_on` must be present in the request when setting or unsetting
          the `start_on` parameter. Additionally, start_on and due_on cannot be the
          same date.*'
        example: 2019-09-14
        format: date
        nullable: true
        type: string
      workspace:
        allOf:
        - "$ref": "#/components/schemas/WorkspaceCompact"
        - description: "*Create-only*. The workspace or organization that the portfolio
            belongs to."
          type: object
    type: object
