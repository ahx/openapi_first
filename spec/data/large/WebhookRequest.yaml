---
WebhookRequest:
  properties:
    filters:
      description: An array of WebhookFilter objects to specify a whitelist of filters
        to apply to events from this webhook. If a webhook event passes any of the
        filters the event will be delivered; otherwise no event will be sent to the
        receiving server.
      items:
        allOf:
        - "$ref": "#/components/schemas/WebhookFilter"
        - description: A set of filters to specify a whitelist for what types of events
            will be delivered.
        - type: object
      type: array
    resource:
      description: A resource ID to subscribe to. Many Asana resources are valid to
        create webhooks on, but higher-level resources require filters.
      example: '12345'
      type: string
    target:
      description: The URL to receive the HTTP POST. The full URL will be used to
        deliver events from this webhook (including parameters) which allows encoding
        of application-specific state when the webhook is created.
      example: https://example.com/receive-webhook/7654?app_specific_param=app_specific_value
      format: uri
      type: string
  required:
  - resource
  - target
  type: object
