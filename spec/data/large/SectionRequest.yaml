---
SectionRequest:
  properties:
    insert_after:
      description: An existing section within this project after which the added section
        should be inserted. Cannot be provided together with insert_before.
      example: '987654'
      type: string
    insert_before:
      description: An existing section within this project before which the added
        section should be inserted. Cannot be provided together with insert_after.
      example: '86420'
      type: string
    name:
      description: The text to be displayed as the section name. This cannot be an
        empty string.
      example: Next Actions
      type: string
    project:
      description: "*Create-Only* The project to create the section in"
      example: '13579'
      type: string
  required:
  - project
  - name
  type: object
