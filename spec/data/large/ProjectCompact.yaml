---
ProjectCompact:
  allOf:
  - "$ref": "#/components/schemas/AsanaResource"
  - description: A *project* represents a prioritized list of tasks in Asana or a
      board with columns of tasks represented as cards. It exists in a single workspace
      or organization and is accessible to a subset of users in that workspace or
      organization, depending on its permissions.
    properties:
      name:
        description: Name of the project. This is generally a short sentence fragment
          that fits on a line in the UI for maximum readability. However, it can be
          longer.
        example: Stuff to buy
        type: string
    type: object
    x-docs-overrides:
      properties.resource_type.example: project
