  "/workspaces/{workspace_gid}/typeahead":
    get:
      description: |-
        Retrieves objects in the workspace based via an auto-completion/typeahead
        search algorithm. This feature is meant to provide results quickly, so do
        not rely on this API to provide extremely accurate search results. The
        result set is limited to a single page of results with a maximum size, so
        you won’t be able to fetch large numbers of results.

        The typeahead search API provides search for objects from a single
        workspace. This endpoint should be used to query for objects when
        creating an auto-completion/typeahead search feature. This API is meant
        to provide results quickly and should not be relied upon for accurate or
        exhaustive search results. The results sets are limited in size and
        cannot be paginated.

        Queries return a compact representation of each object which is typically
        the gid and name fields. Interested in a specific set of fields or all of
        the fields?! Of course you are. Use field selectors to manipulate what
        data is included in a response.

        Resources with type `user` are returned in order of most contacted to
        least contacted. This is determined by task assignments, adding the user
        to projects, and adding the user as a follower to tasks, messages,
        etc.

        Resources with type `project` are returned in order of recency. This is
        determined when the user visits the project, is added to the project, and
        completes tasks in the project.

        Resources with type `task` are returned with priority placed on tasks
        the user is following, but no guarantee on the order of those tasks.

        Leaving the `query` string empty or omitted will give you results, still
        following the resource ordering above. This could be used to list users or
        projects that are relevant for the requesting user's api token.
      operationId: typeaheadForWorkspace
      responses:
        '200':
          content:
            application/json:
              schema:
                description: A generic list of objects, such as those returned by
                  the typeahead search endpoint.
                properties:
                  data:
                    items:
                      "$ref": "#/components/schemas/AsanaNamedResource"
                    type: array
                type: object
          description: Successfully retrieved objects via a typeahead search algorithm.
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '500':
          "$ref": "#/components/responses/InternalServerError"
      summary: Get objects via typeahead
      tags:
      - Typeahead
    parameters:
    - "$ref": "#/components/parameters/workspace_path_gid"
    - description: 'The type of values the typeahead should return. You can choose
        from one of the following: `custom_field`, `project`, `portfolio`, `tag`,
        `task`, and `user`. Note that unlike in the names of endpoints, the types
        listed here are in singular form (e.g. `task`). Using multiple types is not
        yet supported.'
      in: query
      name: resource_type
      required: true
      schema:
        default: user
        enum:
        - custom_field
        - portfolio
        - project
        - tag
        - task
        - user
        type: string
    - description: "*Deprecated: new integrations should prefer the resource_type
        field.*"
      in: query
      name: type
      required: false
      schema:
        default: user
        enum:
        - custom_field
        - portfolio
        - project
        - tag
        - task
        - user
        type: string
    - description: The string that will be used to search for relevant objects. If
        an empty string is passed in, the API will currently return an empty result
        set.
      example: Greg
      in: query
      name: query
      schema:
        type: string
    - description: The number of results to return. The default is 20 if this parameter
        is omitted, with a minimum of 1 and a maximum of 100. If there are fewer results
        found than requested, all will be returned.
      example: 20
      in: query
      name: count
      schema:
        type: integer
    - "$ref": "#/components/parameters/pretty"
    - "$ref": "#/components/parameters/fields"
